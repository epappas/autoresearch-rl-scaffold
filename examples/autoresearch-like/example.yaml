name: autoresearch-like

objective:
  metric: val_bpb
  direction: min

target:
  type: command
  workdir: examples/autoresearch-like
  timeout_s: 30
  train_cmd:
    - python3
    - train.py
  eval_cmd:
    - python3
    - train.py

policy:
  type: grid
  params:
    learning_rate: [0.0020, 0.0026, 0.0032]
    grad_clip: [0.7, 0.85, 1.0]
    use_qk_norm: [true, false]

controller:
  max_wall_time_s: 30
  no_improve_limit: 5
  failure_rate_limit: 0.8
  failure_window: 5

comparability:
  budget_mode: fixed_wallclock
  expected_budget_s: 30
  expected_hardware_fingerprint: null
  strict: false

telemetry:
  trace_path: traces/events.jsonl
  ledger_path: artifacts/autoresearch-like/results.tsv
  artifacts_dir: artifacts/autoresearch-like/runs
  versions_dir: artifacts/autoresearch-like/versions
