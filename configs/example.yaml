name: autoresearch-run

objective:
  metric: val_bpb
  direction: min

target:
  type: command
  workdir: .
  timeout_s: 3600
  train_cmd:
    - python3
    - examples/minimal-trainable-target/train.py
  eval_cmd:
    - python3
    - examples/minimal-trainable-target/train.py

policy:
  type: grid
  params:
    lr: [0.001, 0.002, 0.003]

controller:
  max_wall_time_s: 3600
  no_improve_limit: 10
  failure_rate_limit: 0.8
  failure_window: 5

telemetry:
  trace_path: traces/events.jsonl
  ledger_path: artifacts/results.tsv
  artifacts_dir: artifacts/runs
  versions_dir: artifacts/versions
