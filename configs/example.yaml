experiment:
  name: autoresearch-like-v0
  max_wall_seconds: 20
  target_files:
    - examples/autoresearch-like/train.py
  objective: val_bpb
  contract:
    frozen_file: examples/autoresearch-like/prepare.py
    mutable_file: examples/autoresearch-like/train.py
    program_file: examples/autoresearch-like/program.md
    strict: true
  comparability:
    budget_mode: fixed_wallclock
    expected_budget_s: 20
    expected_hardware_fingerprint: null
    strict: true
sandbox:
  allow_network: false
  max_memory_gb: 32
  max_cpu_cores: 16
controller:
  max_iterations: 100
  history_window: 32
telemetry:
  trace_path: traces/events.jsonl
  ledger_path: results.tsv
policy:
  provider: "baseline"
  temperature: 0.4
eval:
  early_stop:
    enabled: true
    check_every_seconds: 30
