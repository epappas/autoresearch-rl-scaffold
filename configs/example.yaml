experiment:
  name: scaffold-default
  max_wall_seconds: 30
  target_files:
    - train.py
  objective: val_bpb
  contract:
    frozen_file: prepare.py
    mutable_file: train.py
    program_file: programs/default.md
    strict: false
  comparability:
    budget_mode: fixed_wallclock
    expected_budget_s: 30
    expected_hardware_fingerprint: null
    strict: false
sandbox:
  allow_network: false
  max_memory_gb: 32
  max_cpu_cores: 16
controller:
  max_iterations: 3
  history_window: 32
telemetry:
  trace_path: traces/events.jsonl
  ledger_path: results.tsv
policy:
  provider: "baseline"
  temperature: 0.4
eval:
  early_stop:
    enabled: false
    check_every_seconds: 30
